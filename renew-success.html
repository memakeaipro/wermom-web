<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wermom - Renewal Successful</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --cream: #FFF9F5;
            --blush: #FFE4D6;
            --rose: #E8846A;
            --rose-deep: #D4604A;
            --sage: #7BA68D;
            --sage-light: #E8F2EC;
            --sage-deep: #5C8A6F;
            --midnight: #1A1A2E;
            --charcoal: #2D2D3F;
            --slate: #4A4A5E;
            --warm-gray: #8A8A9A;
            --white: #FFFFFF;
        }

        html, body {
            width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, rgba(255,249,245,0.5) 0%, rgba(232,242,236,0.3) 100%),
                        radial-gradient(circle at 20% 50%, rgba(255,228,214,0.2) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(123,166,141,0.1) 0%, transparent 50%),
                        var(--cream);
            background-attachment: fixed;
            color: var(--midnight);
            line-height: 1.6;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 60px 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--white);
            border-radius: 20px;
            padding: 48px 32px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            text-align: center;
        }

        .success-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, var(--sage-light) 0%, #c8e6d0 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: scaleIn 0.5s ease;
        }

        .success-icon svg {
            width: 36px; height: 36px;
            color: var(--sage-deep);
        }

        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .card h1 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 600;
            color: var(--midnight);
            margin-bottom: 12px;
        }

        .card p {
            color: var(--slate);
            font-size: 15px;
            margin-bottom: 8px;
        }

        .status-badge {
            display: inline-block;
            background: var(--sage-light);
            color: var(--sage-deep);
            font-size: 13px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 20px;
            margin: 16px 0 28px;
        }

        .status-badge.loading {
            background: var(--blush);
            color: var(--rose-deep);
        }

        .status-badge .spinner {
            display: inline-block;
            width: 12px; height: 12px;
            border: 2px solid rgba(212,96,74,0.3);
            border-top-color: var(--rose-deep);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-back {
            display: inline-block;
            padding: 14px 32px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--rose) 0%, var(--rose-deep) 100%);
            color: white;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(212,96,74,0.3);
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(212,96,74,0.4);
        }

        .confetti {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 10;
        }

        .confetti-piece {
            position: absolute;
            top: -10px;
            width: 10px; height: 10px;
            border-radius: 2px;
            animation: confettiFall 3s ease-in forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>

</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PMBJ4P92"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <div class="confetti" id="confetti"></div>

    <div class="container">
        <div class="card">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
            </div>

            <h1>Renewal Successful!</h1>
            <p>Your Wermom Expert access has been extended for another year.</p>

            <div class="status-badge loading" id="statusBadge">
                <span class="spinner"></span> Verifying payment...
            </div>

            <p style="font-size:13px; color: var(--warm-gray); margin-bottom: 28px;">
                A receipt has been sent to your email.
            </p>

            <a href="javascript:void(0)" class="btn-back" onclick="goBackToApp()">
                Back to App
            </a>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://wermom-backend-production.up.railway.app';

        // Confetti animation
        function createConfetti() {
            const container = document.getElementById('confetti');
            const colors = ['#E8846A', '#D4604A', '#7BA68D', '#F4A886', '#FFE4D6', '#5C8A6F'];
            for (let i = 0; i < 50; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDelay = Math.random() * 2 + 's';
                piece.style.width = (Math.random() * 8 + 5) + 'px';
                piece.style.height = (Math.random() * 8 + 5) + 'px';
                container.appendChild(piece);
            }
        }

        // Verify payment status
        async function verifyPayment() {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('session_id');
            const badge = document.getElementById('statusBadge');

            if (!sessionId) {
                badge.innerHTML = 'Payment confirmed';
                badge.classList.remove('loading');
                createConfetti();
                return;
            }

            try {
                const resp = await fetch(`${BACKEND_URL}/api/payment/renew-status?session_id=${sessionId}`);
                const data = await resp.json();

                if (data.success && data.status === 'paid') {
                    badge.innerHTML = '&#10003; Payment confirmed';
                    badge.classList.remove('loading');
                    createConfetti();
                } else {
                    badge.innerHTML = 'Payment processing...';
                    // Retry in 3 seconds
                    setTimeout(verifyPayment, 3000);
                }
            } catch (err) {
                badge.innerHTML = '&#10003; Payment confirmed';
                badge.classList.remove('loading');
                createConfetti();
            }
        }

        function goBackToApp() {
            // Try to open the Wermom app via deep link
            window.location.href = 'wermom://renewal-success';
            // Fallback: close the window after 1s if deep link didn't work
            setTimeout(() => {
                window.close();
            }, 1000);
        }

        // Start verification on load
        verifyPayment();
    </script>
</body>
</html>
