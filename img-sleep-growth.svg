<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 680" width="375" height="680">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F9FA"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="375" height="680" fill="url(#bgGrad)"/>

  <!-- Header -->
  <rect x="0" y="0" width="375" height="72" fill="white"/>
  <line x1="0" y1="72" x2="375" y2="72" stroke="#F0F0F0" stroke-width="1"/>
  <text x="56" y="34" font-family="-apple-system, SF Pro Display, Helvetica" font-size="24" font-weight="700" fill="#000">Track Growth</text>
  <text x="56" y="56" font-family="-apple-system, SF Pro Text, Helvetica" font-size="13" font-weight="500" fill="#666">WHO standard percentile charts</text>

  <!-- Tab Bar -->
  <rect x="20" y="88" width="335" height="40" rx="12" fill="#F0F0F0"/>
  <rect x="24" y="92" width="78" height="32" rx="8" fill="white" stroke="#E91E8C" stroke-width="2"/>
  <text x="63" y="112" font-family="-apple-system" font-size="12" font-weight="600" fill="#E91E8C" text-anchor="middle">Weight</text>
  <text x="146" y="112" font-family="-apple-system" font-size="12" font-weight="500" fill="#999" text-anchor="middle">Height</text>
  <text x="225" y="112" font-family="-apple-system" font-size="12" font-weight="500" fill="#999" text-anchor="middle">Head</text>
  <text x="310" y="112" font-family="-apple-system" font-size="12" font-weight="500" fill="#999" text-anchor="middle">Summary</text>

  <!-- Stats Row -->
  <rect x="16" y="144" width="107" height="74" rx="12" fill="white" filter="url(#shadow1)"/>
  <text x="69" y="168" font-family="-apple-system" font-size="11" font-weight="500" fill="#999" text-anchor="middle">At Birth</text>
  <text x="69" y="192" font-family="-apple-system, SF Pro Display" font-size="18" font-weight="700" fill="#000" text-anchor="middle">3.2</text>
  <text x="69" y="207" font-family="-apple-system" font-size="10" fill="#CCC" text-anchor="middle">Jan 15</text>

  <rect x="134" y="144" width="107" height="74" rx="12" fill="white" filter="url(#shadow1)"/>
  <text x="187" y="168" font-family="-apple-system" font-size="11" font-weight="500" fill="#999" text-anchor="middle">Current</text>
  <text x="187" y="192" font-family="-apple-system, SF Pro Display" font-size="18" font-weight="700" fill="#000" text-anchor="middle">7.8</text>
  <text x="187" y="207" font-family="-apple-system" font-size="10" fill="#CCC" text-anchor="middle">Sep 15</text>

  <rect x="252" y="144" width="107" height="74" rx="12" fill="white" filter="url(#shadow1)"/>
  <text x="305" y="168" font-family="-apple-system" font-size="11" font-weight="500" fill="#999" text-anchor="middle">Change</text>
  <text x="305" y="192" font-family="-apple-system, SF Pro Display" font-size="18" font-weight="700" fill="#10B981" text-anchor="middle">+4.6</text>
  <text x="305" y="207" font-family="-apple-system" font-size="10" fill="#999" text-anchor="middle">143.8% growth</text>

  <!-- Percentile Badge -->
  <rect x="20" y="232" width="335" height="30" rx="8" fill="#F0FDF4" stroke="#DCFCE7" stroke-width="1"/>
  <circle cx="36" cy="247" r="8" fill="#10B981"/>
  <text x="36" y="251" font-family="-apple-system" font-size="10" fill="white" text-anchor="middle">&#10003;</text>
  <text x="52" y="251" font-family="-apple-system, SF Pro Text" font-size="13" font-weight="600" fill="#10B981">Baby's percentile: 50th-85th (High Average)</text>

  <!-- Growth Chart -->
  <rect x="16" y="276" width="343" height="260" rx="16" fill="white" filter="url(#shadow1)"/>
  <text x="32" y="304" font-family="-apple-system, SF Pro Text" font-size="14" font-weight="700" fill="#000">Growth Trajectory</text>

  <!-- Chart Bars (simplified WHO bands) -->
  <!-- Month 0 -->
  <rect x="44" y="326" width="28" height="20" rx="2" fill="rgba(239,68,68,0.15)"/>
  <rect x="44" y="316" width="28" height="24" rx="2" fill="rgba(249,115,22,0.15)"/>
  <rect x="44" y="346" width="28" height="30" rx="2" fill="rgba(34,197,94,0.15)"/>
  <rect x="44" y="376" width="28" height="20" rx="2" fill="rgba(59,130,246,0.15)"/>
  <circle cx="58" cy="340" r="6" fill="#E91E8C"/>

  <!-- Month 2 -->
  <rect x="84" y="318" width="28" height="22" rx="2" fill="rgba(239,68,68,0.15)"/>
  <rect x="84" y="308" width="28" height="28" rx="2" fill="rgba(249,115,22,0.15)"/>
  <rect x="84" y="340" width="28" height="34" rx="2" fill="rgba(34,197,94,0.15)"/>
  <rect x="84" y="374" width="28" height="24" rx="2" fill="rgba(59,130,246,0.15)"/>
  <circle cx="98" cy="352" r="6" fill="#E91E8C"/>

  <!-- Month 4 -->
  <rect x="124" y="312" width="28" height="24" rx="2" fill="rgba(239,68,68,0.15)"/>
  <rect x="124" y="300" width="28" height="30" rx="2" fill="rgba(249,115,22,0.15)"/>
  <rect x="124" y="336" width="28" height="36" rx="2" fill="rgba(34,197,94,0.15)"/>
  <rect x="124" y="372" width="28" height="26" rx="2" fill="rgba(59,130,246,0.15)"/>
  <circle cx="138" cy="360" r="6" fill="#E91E8C"/>

  <!-- Month 6 -->
  <rect x="164" y="306" width="28" height="26" rx="2" fill="rgba(239,68,68,0.15)"/>
  <rect x="164" y="292" width="28" height="34" rx="2" fill="rgba(249,115,22,0.15)"/>
  <rect x="164" y="332" width="28" height="38" rx="2" fill="rgba(34,197,94,0.15)"/>
  <rect x="164" y="370" width="28" height="28" rx="2" fill="rgba(59,130,246,0.15)"/>
  <circle cx="178" cy="362" r="6" fill="#E91E8C"/>

  <!-- Month 8 -->
  <rect x="204" y="300" width="28" height="28" rx="2" fill="rgba(239,68,68,0.15)"/>
  <rect x="204" y="284" width="28" height="36" rx="2" fill="rgba(249,115,22,0.15)"/>
  <rect x="204" y="328" width="28" height="40" rx="2" fill="rgba(34,197,94,0.15)"/>
  <rect x="204" y="368" width="28" height="30" rx="2" fill="rgba(59,130,246,0.15)"/>
  <circle cx="218" cy="364" r="6" fill="#E91E8C"/>

  <!-- Month labels -->
  <text x="58" y="418" font-family="-apple-system" font-size="10" fill="#999" text-anchor="middle">0m</text>
  <text x="98" y="418" font-family="-apple-system" font-size="10" fill="#999" text-anchor="middle">2m</text>
  <text x="138" y="418" font-family="-apple-system" font-size="10" fill="#999" text-anchor="middle">4m</text>
  <text x="178" y="418" font-family="-apple-system" font-size="10" fill="#999" text-anchor="middle">6m</text>
  <text x="218" y="418" font-family="-apple-system" font-size="10" fill="#999" text-anchor="middle">8m</text>

  <!-- Legend -->
  <rect x="32" y="434" width="12" height="12" rx="2" fill="rgba(239,68,68,0.15)"/>
  <text x="50" y="444" font-family="-apple-system" font-size="10" fill="#666">Below Avg</text>
  <rect x="114" y="434" width="12" height="12" rx="2" fill="rgba(34,197,94,0.15)"/>
  <text x="132" y="444" font-family="-apple-system" font-size="10" fill="#666">High Avg</text>
  <rect x="196" y="434" width="12" height="12" rx="2" fill="rgba(59,130,246,0.15)"/>
  <text x="214" y="444" font-family="-apple-system" font-size="10" fill="#666">Above Avg</text>
  <circle cx="282" cy="440" r="4" fill="#E91E8C"/>
  <text x="292" y="444" font-family="-apple-system" font-size="10" fill="#666">Baby</text>

  <!-- Measurement Table -->
  <rect x="16" y="556" width="343" height="114" rx="16" fill="white" filter="url(#shadow1)"/>
  <text x="32" y="582" font-family="-apple-system, SF Pro Text" font-size="14" font-weight="700" fill="#000">Measurement History</text>

  <rect x="16" y="592" width="343" height="28" fill="#F9F9F9"/>
  <text x="32" y="610" font-family="-apple-system" font-size="11" font-weight="600" fill="#999">Month</text>
  <text x="120" y="610" font-family="-apple-system" font-size="11" font-weight="600" fill="#999">Value (kg)</text>
  <text x="220" y="610" font-family="-apple-system" font-size="11" font-weight="600" fill="#999">Percentile</text>

  <text x="32" y="638" font-family="-apple-system" font-size="12" fill="#333">8m</text>
  <text x="120" y="638" font-family="-apple-system" font-size="12" fill="#333">7.8</text>
  <text x="220" y="638" font-family="-apple-system" font-size="12" fill="#666">50th-85th</text>

  <text x="32" y="660" font-family="-apple-system" font-size="12" fill="#333">6m</text>
  <text x="120" y="660" font-family="-apple-system" font-size="12" fill="#333">7.1</text>
  <text x="220" y="660" font-family="-apple-system" font-size="12" fill="#666">50th-85th</text>
</svg>