<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 520" width="280" height="520">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E91E8C"/><stop offset="100%" stop-color="#F34B9B"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10B981"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <clipPath id="screenClip"><rect x="12" y="12" width="256" height="496" rx="28"/></clipPath>
  </defs>
  <!-- Phone body -->
  <rect width="280" height="520" rx="36" fill="#1a1a2e" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <g clip-path="url(#screenClip)">
    <!-- Screen bg -->
    <rect x="12" y="12" width="256" height="496" fill="#FDF2F8"/>
    <!-- Status bar -->
    <rect x="12" y="12" width="256" height="36" fill="rgba(253,242,248,0.95)"/>
    <text x="140" y="32" font-family="-apple-system,Helvetica" font-size="11" font-weight="600" fill="#1F2937" text-anchor="middle">9:41</text>
    <!-- Notch -->
    <rect x="100" y="12" width="80" height="24" rx="12" fill="#1a1a2e"/>

    <!-- Header -->
    <text x="28" y="72" font-family="-apple-system,Helvetica" font-size="22" font-weight="700" fill="#1F2937">Kick Counter</text>
    <text x="28" y="90" font-family="-apple-system,Helvetica" font-size="11" font-weight="500" fill="#6B7280">Track your baby's movements</text>

    <!-- Counter Card -->
    <rect x="20" y="104" width="240" height="158" rx="16" fill="white"/>
    <text x="140" y="175" font-family="-apple-system,Helvetica" font-size="72" font-weight="800" fill="#E91E8C" text-anchor="middle">7</text>
    <text x="140" y="196" font-family="-apple-system,Helvetica" font-size="12" font-weight="600" fill="#6B7280" text-anchor="middle">kicks</text>
    <text x="140" y="228" font-family="-apple-system,Helvetica" font-size="32" font-weight="700" fill="#E91E8C" text-anchor="middle">03:24</text>
    <text x="140" y="248" font-family="-apple-system,Helvetica" font-size="10" font-weight="600" fill="#6B7280" text-anchor="middle">elapsed time</text>

    <!-- Green Kick Button -->
    <rect x="20" y="274" width="240" height="130" rx="20" fill="url(#g2)"/>
    <text x="140" y="340" font-family="-apple-system,Helvetica" font-size="48" font-weight="800" fill="white" text-anchor="middle">7</text>
    <text x="140" y="370" font-family="-apple-system,Helvetica" font-size="12" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1.5">TAP FOR EACH KICK</text>

    <!-- Stop Button -->
    <rect x="20" y="416" width="240" height="36" rx="10" fill="#EF4444"/>
    <text x="140" y="439" font-family="-apple-system,Helvetica" font-size="13" font-weight="700" fill="white" text-anchor="middle">Stop Session</text>

    <!-- Info hint -->
    <rect x="20" y="464" width="240" height="36" rx="10" fill="#FFF5F9"/>
    <rect x="20" y="464" width="3" height="36" rx="1.5" fill="#E91E8C"/>
    <text x="36" y="480" font-family="-apple-system,Helvetica" font-size="10" font-weight="700" fill="#1F2937">How to Count Kicks</text>
    <text x="36" y="492" font-family="-apple-system,Helvetica" font-size="9" fill="#6B7280">10+ movements in 1-2 hours is healthy</text>
  </g>
  <!-- Home indicator -->
  <rect x="105" y="500" width="70" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
</svg>